<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi App Backend</title>
    <link rel="stylesheet" href="Index.css">
</head>
<body>

    <div class="container">
        <h1> Mi Backend App</h1>
        <p>Haz clic para conectar con el servidor</p>

        <br>

        <button onclick="cargarMensaje()">Obtener mensaje</button>

        <p id="resultado"></p>
    </div>

    <script>
        function cargarMensaje() {
            fetch('/api/mensaje')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('resultado').innerText = data.mensaje;
                });
        }
    </script>

</body>
</html>
